            text: `Slide 1: Introduction – The Ethics and Philosophy of Biomedical Research. We open this training with one of the most complex issues in modern science: the inherent tension between medical advancement and our moral obligation toward animals. As graduate researchers, you must understand that research does not exist in a vacuum. It rests upon an unwritten "social contract," in which the public grants us the right to use sentient beings in exchange for our commitment to minimizing suffering and generating life-saving knowledge. Biologically, we operate under the assumption of "phylogenetic continuity." This means that physiological mechanisms, and specifically the central nervous system responsible for pain perception, are distinctly similar between various mammals and humans. This similarity is what allows us to draw conclusions from the model to the human patient, but it is also what imposes upon us the heaviest moral responsibility. The morality accompanying Israeli law draws from diverse sources. In Judaism, the concept of "Tza'ar Ba'alei Chayim" (the suffering of living creatures) is a Torah-mandated prohibition (De-oraita), recognizing that animals are capable of suffering and, therefore, unnecessary pain must be prevented. This perception is not unique to Judaism; in Islam, the principles of "Rahma" (mercy) and "Ihsan" (excellence/doing good) oblige every Muslim to act with compassion toward every living creature, and the Prophet Muhammad even warned against causing unnecessary suffering to animals. In the Christian tradition as well, the concept of "Stewardship" positions man as the guardian of creation rather than an owner with unlimited rights of exploitation. The convergence of these three monotheistic religions within the Israeli sphere creates a broad ethical consensus: it is permissible to use animals for the benefit of humankind, but we are duty-bound to be "custodians" of their welfare. Beyond the monotheistic religions familiar to our region, it is important to recognize the contribution of Eastern philosophies to the global ethical fabric of animal welfare. In Hinduism, the principle of 'Ahimsa'—non-violence—is a central pillar. According to this belief, all living beings carry within them a divine spark (Atman); therefore, harming an animal is perceived as a disruption of the cosmic order and as causing suffering to oneself. Similarly, Buddhism emphasizes the value of compassion (Karuna) toward all "sentient beings," recognizing that all creatures strive to avoid suffering. In Sikhism as well, there is an emphasis on the fact that the Creator resides in all of creation; thus, it is the believer's duty to act with respect and kindness toward every living thing. These perspectives strengthen the international scientific consensus: the use of animals in research is not a self-evident right, but a moral privilege requiring constant justification and an approach of humility and mercy. From a research perspective, we must remember that a stressed animal is not a good model. The HPA system (Hypothalamic-Pituitary-Adrenal axis) is activated during distress, leading to the secretion of glucocorticoids. These affect the immune system, gene expression, and behavioral responses. Therefore, maintaining animal welfare is a pure scientific interest for clearing "background noise" from the results. This training will focus on Israeli law, yet it is important to remember that the law is only the minimum threshold. As graduate students, you are required to strive for the highest ethical standard. You are the ones on the "front line"—in the laboratory, the operating room, and the animal house—and your professional decisions are what will determine the animal's quality of life. Today we will discuss the 3Rs principles, which have evolved from a philosophical recommendation into a rigid regulatory requirement. The concepts of Replacement, Reduction, and Refinement are the compass that should guide you in writing every protocol and performing every procedure. It is important to emphasize that the law in Israel is considered one of the most advanced in the world, precisely because of the integration between representatives of science and representatives of animal welfare organizations. This dialogue, though sometimes difficult, ensures that research continues to progress while maintaining its public legitimacy. A classic example of the importance of ethics is the development of insulin or biological cancer treatments. Without animal models, we would not be here today. Yet, alongside this success, we must always ask: Could we have done it with less suffering? This is the question that will accompany us throughout the entire presentation. To conclude the introduction, I invite you to adopt an approach of "Critical Thinking." Do not take the experiment for granted. A critical examination of the need for the animal is the first step of a responsible and professional scientist.`

            audio: "audio2.mp3", 
            text: `Slide 2: The History of Regulation – The Evolution of Scientific Morality. To understand the Animal Welfare Law of 1994, we must look back at the history of research ethics. Regulation was not born in a vacuum; it is a response to historical events and changes in the social perception of suffering. The rules we operate by today are the product of decades of learning and evolution. The first significant turning point was the Nuremberg Code of 1947. Although it addressed human experimentation, it established a fundamental principle: human experimentation must be based on the preliminary results of animal experiments. This positioned animal research as a necessary link in the chain of medical safety, but also marked animals as the "gatekeepers" of humanity. In the 1960s, the Declaration of Helsinki expanded these principles. It emphasized that animal research must be conducted with consideration for their welfare and that only laboratory animals bred for this purpose should be used. This was the first step toward the standardization of Animal Facilities as we know them today. In Israel, until 1994, the field operated under internal academic procedures, but without a binding legal framework from the State. Public pressure, alongside the scientific understanding of the need for uniformity, led to the legislation of the "Animal Welfare Law (Animal Experimentation)." The law was not intended to ban experiments, but to regulate them under tight supervision. Academically, Israeli law was heavily influenced by the British Cruelty to Animals Act and the American NIH guidelines. It adopted a two-tier structure: a National Council that sets policy, and Institutional Committees (IACUC) that examine each protocol on its own merits. The Israeli law and the Council's procedures do not operate in a regulatory vacuum; rather, they are based on the strictest international standards, primarily the "Guide for the Care and Use of Laboratory Animals" by the NRC (National Research Council). This guide, currently in its eighth edition, constitutes the scientific and ethical "touchstone" in the Western world. It outlines principles regarding not only veterinary care but also facility design, ventilation, lighting, and the psychological welfare of the animals. The Guide promotes a "Performance Standards" approach—meaning that instead of merely dictating dry numbers, it requires the researcher and the institution to prove that the physical conditions indeed lead to optimal welfare outcomes for the specific species involved in the experiment. In addition to the NRC, the Israeli system is deeply influenced by the guidelines of FELASA (Federation of European Laboratory Animal Science Associations). These influences are critical for you as researchers, as most leading scientific journals (such as Nature or Cell) and international research funds (such as the NIH or the ERC) require a formal declaration that the research was performed in accordance with the standards of the Guide. This means that compliance with Israeli law is not merely a matter of meeting state requirements, but a necessary condition for your ability to publish research results on the global scientific stage and to be part of the international academic community. As researchers, you must understand that the law also protects you. When you act according to an approved protocol, you operate under the moral and legal umbrella of the institution and the state. A deviation from the protocol is not only an ethical violation but a criminal offense in every respect. In order for you to begin practical work with animals, the research must meet a regulatory "Triple Approval System." The first approval is the institution's permit to conduct experiments on its premises: the National Council for Animal Experimentation (Ministry of Health) must grant a formal permit to the university or faculty. This permit is contingent upon the presence of an attending veterinarian, adequate infrastructure, and an active ethics committee. Without this institutional approval, the institution is not permitted to hold vertebrates for research purposes at all. The second approval is for the specific Animal Facility: the laboratory or animal house where the animals reside must meet physical licensing standards, including control over temperature, humidity, and sterility, and they must undergo periodic inspections by the Council. The third and most important approval for the individual researcher is the approval of the research protocol by the Institutional Animal Care and Use Committee (IACUC). Every head of a laboratory must submit a detailed application that includes scientific justification, a description of procedures, and full implementation of the 3Rs. Only after the committee is convinced that the scientific benefit outweighs the expected harm to the animal's welfare is an official protocol number granted. It is important to emphasize: working without any one of these three approvals—institutional, facility, and protocol—constitutes a serious criminal offense under the Animal Welfare Law in Israel, and may lead to the suspension of research, disqualification of results, and even the initiation of legal proceedings against the researcher. History teaches us that regulation tends to become stricter over the years. What was considered acceptable in the 1970s (such as experiments without anesthesia at certain levels) is considered completely unacceptable today. This dynamic requires you to always stay updated on the Council's newest procedures. Studies show that in countries with strong regulation, the quality of scientific papers is higher. The reason for this is that the requirements for reporting and precision in animal welfare force the researcher into more rigorous experimental design, which leads to fewer methodological errors. An example of this is the transition to using SPF (Specific Pathogen Free) animals. Regulation demanded a clean environment, and science discovered that animals without hidden pathogens yield much more reproducible results. This is a classic case where ethics and science serve one another. In this historical review, it is also important to note the role of animal welfare organizations. Despite disagreements, their presence on the National Council ensures that civil society is a partner in the process, which increases public trust in academic research.`

            text: `Slide 3: Basic Definitions – The Language of the Law.
• In order for us to speak the same professional language, we must be precise in our legal definitions. Israeli law is very specific: an "Animal" is defined as any vertebrate, excluding humans. This includes mammals, birds, reptiles, amphibians, and fish, but excludes mollusks and similar organisms.
• Why specifically vertebrates? From a neuro-anatomical perspective, these are creatures with a central nervous system developed enough to process sensations of pain and suffering, whether consciously or subconsciously. Nevertheless, science is advancing, and there are currently discussions regarding the inclusion of complex invertebrates, such as octopuses, as has already been implemented in Europe.
• An "Animal Experiment" is defined as any action, even the smallest, intended for one of the following purposes: the promotion of health, scientific research, prevention of suffering, or instruction. Please note: even if the action is non-invasive (for example, behavioral observation involving food deprivation, or even breeding for the purpose of reproduction or the establishment of a colony), it is considered an experiment and requires approval.
• Another crucial definition is the "Qualified Researcher." The law mandates that only individuals who have undergone appropriate training and received certification from the institutional committee of an academic institution to engage in animal experimentation—namely, the course you are currently attending—are permitted to perform procedures on animals. As PhD students, the responsibility for executing the experiment lies with you, but the overall legal responsibility remains with the Principal Investigator (PI).
• A critical concept is the "Authorized Animal Facility." Experiments are permitted to take place solely in facilities that have received approval from the National Council and meet strict standards for proper maintenance, such as ventilation, lighting, cage size, and sterility. The transfer of an animal from the animal facility to your laboratory must be documented and controlled, and it is prohibited to house animals under standards different from those monitored in the animal facility.
• From a medical perspective, the definition of "Animal Welfare" is not merely the absence of pain. It encompasses the Five Freedoms: freedom from hunger and thirst; freedom from discomfort; freedom from pain and injury; freedom to express natural behavior; and freedom from fear and distress.
• An example of the application of this definition: if you perform a procedure on an animal at home or in any other location that is not part of an authorized research institution, you are breaking the law. Every room in which a procedure is performed on an animal must be an approved "experiment room."
• The law also distinguishes between an "experiment" and "routine veterinary care." If an animal becomes ill unrelated to the experiment and the veterinarian treats it, this is not an experiment. However, if the illness is a result of the experiment, its treatment must be part of the approved protocol.
• As university researchers, you must be familiar with the concept of "Protocol Deviation." Any deviation from the original experimental definitions (a change in dosage, type of anesthetic agent, addition of a procedure, change in the number of animals, etc.) requires an approved Amendment by the Institutional Ethics Committee. Do not assume that "it is only a small change."
• Understanding these definitions is the foundation for any application submitted to the ethics committee. An imprecise definition of the procedure may lead to an incorrect classification of the severity level, which could significantly delay your research.`

            audio: "audio4.mp3", 
            text: `Slide 4: The 3Rs Principles – The Ethical and Scientific Compass in Research.
• The historical background of the 3Rs principles takes us back to 1959, when the zoologist William Russell and the microbiologist Rex Burch published their seminal book, "The Principles of Humane Experimental Technique." The book was not written as an abstract philosophical essay, but as a response to the scientific need to improve the quality of experiments. They argued that "humane technique" is a necessary condition for accurate science, as suffering and stress are confounders that alter the animal's physiology and bias the results.
• Since its publication, these principles have become the basis for every modern regulation in the world, including EU Directive 2010/63/EU and the FELASA guidelines. In Israel, these principles are not just an ethical recommendation; they are woven like a common thread throughout the language of the "Animal Welfare Law (Animal Experimentation), 5754-1994" and constitute the legal criteria by which the Ethics Committee evaluates your applications.
• The first and highest principle in the hierarchy is Replacement. This means actively searching for methods that do not include the use of sentient animals. We distinguish between "absolute" replacement, such as the use of computer models (In-silico) or human cell cultures, and "relative" replacement, which includes the use of organisms with lower neurological sensitivity, such as flies or bacteria. The goal is to prevent the experiment on the animal in the first first place if the scientific objective can be achieved otherwise.
• The second principle is Reduction. If it is proven that there is no alternative to using animals, we must use the minimum number of animals required to achieve a statistically valid result. This is not about arbitrary cuts in numbers, but about smart Experimental Design. Using tools like Power Analysis allows us to determine exactly how many animals are needed so that we do not conduct an experiment that would be useless due to a sample size that is too small, or wasteful due to a sample size that is too large.
• The third principle is Refinement. This is a principle that applies throughout the animal's entire lifespan—from the moment it arrives at the facility until the end of the experiment. Refinement includes all measures to minimize pain and distress and to improve welfare: from the use of non-invasive imaging techniques, through the provision of advanced analgesia, to environmental enrichment that improves the animal's psychological state. Proper refinement reduces variability in scientific results.
• The hierarchical order of the three Rs is critical. This hierarchy is not accidental: it reflects ethical priorities. We always start by attempting Replacement; if this is impossible, we move to Reduction; and in any case, throughout the entire process, we apply Refinement to minimize suffering. This is an "ethical ladder" where every step down requires substantial scientific justification to proceed to the next level.
• In Israeli law, these principles appear explicitly in the guidelines for conducting experiments. The law does not use the acronym "3Rs," but it embeds them as threshold requirements. A researcher who does not demonstrate to the Institutional Committee how they will implement these three principles will not be able to receive a permit for their research.
• Regarding Replacement, note the quote from the language of the law, Section 9: "A permit to conduct an animal experiment shall not be granted if the purpose of the experiment can be achieved by reasonable alternative ways." This is a categorical instruction. The burden of proof that no alternative exists rests on your shoulders as researchers. You must show that you have reviewed the professional literature and found no suitable In-vitro model.
• Regarding Reduction and Refinement, Sections 10 and 11 of the law clearly state: "In an animal experiment... the number of animals participating in the experiment shall be the minimum required to conduct the experiment... and the suffering caused to them shall be the minimum required to achieve the purpose of the experiment." Here, the legislator connects statistical efficiency with clinical compassion. The word "minimum" is the key word that obliges us to constantly optimize.
• As graduate students, you must understand that the application of the 3Rs is the measure of your laboratory's excellence. A scientist who does not master up-to-date replacement or refinement methods is considered today as a less professional scientist. In publications in prestigious journals, you will be asked to describe your "Ethical Statement," where the detail regarding the implementation of the 3Rs will determine your credibility in the eyes of the international scientific community.`

            img: "slide5.jpg", 
            audio: "audio5.mp3", 
            text: `Slide 5: The Institutional Structure – The Three Arms of Oversight and Ethics.
• Having understood the 3Rs principles and the law at the national level, we will now move on to examine the organizational structure within the university. Compliance with the Animal Welfare Law is not the task of a single researcher, but rather a comprehensive institutional commitment. In order to meet the rigorous standards of the National Council for Animal Experimentation, the university has established a regulatory framework composed of three central arms operating in synergy: the Institutional Official, the Institutional Committee, and the Attending Veterinarian.
• At the head of this framework stands the Institutional Official (IO). At Bar-Ilan University, this position is held by the Vice President for Research. This choice of such a senior management level is not accidental; it is intended to ensure that the university has full operational and budgetary commitment to the Animal Care program. The Institutional Official is the formal representative to the National Council and bears the ultimate legal responsibility for ensuring that the institution provides the necessary resources—from physical infrastructure to professional personnel—to maintain animal welfare.
• The second arm is the Institutional Animal Care and Use Committee (IACUC). This is the oversight and approval arm, which received its statutory mandate from the National Council to discuss and approve internal protocols. The committee operates as a "Peer Review" body and examines every request for an experiment with a critical eye. Its role is to ensure that the experiment is scientifically justified, that there are no alternatives, and that all necessary refinements have been implemented to minimize suffering.
• The composition of the Institutional Committee is dictated by law and includes researchers from various fields, a veterinarian, and representatives of the public or animal welfare organizations. This diversity is intended to prevent "laboratory blindness" and to ensure that piercing ethical questions are asked. The committee does not settle for written protocol approval alone; it is authorized to conduct surprise inspections in laboratories and animal houses to ensure that work is performed exactly as approved.
• The third arm, which is critical to your daily work, is the Attending Veterinarian (AV). The veterinarian is the supreme medical authority in the institution regarding animal health and welfare. The AV operates on behalf of the National Council within the university, and their role is to ensure that the animals receive appropriate veterinary care, suitable analgesia, and optimal living conditions.
• The Attending Veterinarian possesses "Independent Authority." This means that even if a researcher believes a certain procedure is essential to the experiment, the veterinarian has the final word and full authority to stop an experiment or order the humane euthanasia of an animal if they perceive that its welfare has been compromised beyond what is permitted. The veterinarian is your partner in planning analgesia and anesthesia and is the first professional resource you should turn to in any case of clinical doubt.
• This three-armed structure (IO, IACUC, AV) is directly influenced by the Guide for the Care and Use of Laboratory Animals and international AAALAC standards. It is a "checks and balances" model in which each arm balances the others: the Institutional Official provides the infrastructure, the Committee provides ethical oversight, and the Veterinarian provides clinical care and field supervision.
• You must understand that this hierarchy is designed to protect you as researchers. When a protocol is approved by the committee and supervised by the veterinarian under the auspices of the Vice President for Research, your research receives institutional and legal backing. This is the basis of "Institutional Accountability," which ensures that the science conducted at Bar-Ilan stands at the forefront of global ethics.
• An example of the implementation of this hierarchy is a malfunction in the animal house. In the event of a failure in the air conditioning system, the Attending Veterinarian would order the evacuation of the animals, the Institutional Official would approve the resources required for immediate repair, and the Institutional Committee would conduct an investigation to ensure such an event does not recur. This is a living, breathing system designed to serve both the animals and science alike.
• To conclude this slide, as graduate students, you should get to know these officials personally. They are not "police officers" but the gatekeepers of your scientific and ethical quality. Remember that your experimental permit is a binding legal document, and the professional relationship with the veterinarian and the committee is the key to the success of your research project.`

            id: 6, 
            img: "slide6.jpg", 
            audio: "audio6.mp3", 
            text: `Slide 6: Severity Classification – Assessing the Potential for Pain and Suffering.
• We now reach one of the most important regulatory tools in managing animal research: the classification of severity levels. It is important to understand that the severity level is not a "grade" for the experiment, but rather a tool for ethical risk assessment. The classification is determined based on the most severe potential pain and suffering to which the animal may be exposed, even if it occurs for only a single moment throughout the entire experiment. The fact that we have classified an experiment at a certain level does not mean that the potential will be realized, but our commitment is to prepare for the worst-case scenario.
• A critical point that researchers sometimes tend to miss is that the potential for pain and suffering, rather than the type of procedure itself, determines the level. Occasionally, a procedure that appears "light" from a technical standpoint, such as breeding, can become a high severity level if the experiment lasts for a very long time and the animal reaches a geriatric state involving chronic discomfort. Conversely, a complex procedure performed under full anesthesia without recovery will be classified at a lower level due to the absence of pain perception.
• Severity Level 1 is the most basic level, in which no experimental action is actually performed on the animal while it is alive. Research is conducted on tissues or organs removed from the animal after it has been euthanized using an approved and humane method. At this level, the research interaction with the living animal is negligible, and it is primarily used for molecular or histological studies.
• Severity Level 2 describes research where the potential for pain is minimal and does not exceed "temporary discomfort." The accepted clinical benchmark here is pain that does not exceed that involved in a single injection or taking blood from a healthy animal. This is the common severity level for studies involving the administration of substances by ingestion or injection, where no painful pathological effects are anticipated following the substance.
• Severity Level 3 represents a "moderate level." This involves a potential for pain that does not cause permanent physiological change or a change in the animal's social behavior. Interestingly, acute experiments—meaning very complex surgeries performed under full anesthesia from which the animal does not recover—are classified as Level 3. The reason for this is that although the procedure is invasive, the animal does not experience post-operative pain.
• Severity Level 4 is a stage where we expect significant physiological change, such as prolonged restraint or the development of a local cancerous tumor. At this level, there is a regulatory obligation to provide analgesics to maintain the animal's autonomic function. Occasionally, classification at Level 4 is done precisely because of the need for intensive pharmacological treatment. There are cases, such as painless paralysis, that would be classified here due to the impact on the quality of life and overall welfare, even without "pain" in its classic sense.
• Severity Level 5 is the highest level and is reserved for experiments with the potential for substantial and prolonged suffering or stress. This includes studies where, for justified scientific reasons, analgesics cannot be administered (for example, when the analgesic drug interferes with the biological mechanism being studied), or studies dealing with toxins and metastatic cancer. These experiments are subject to particularly tight supervision and require special approvals from the Institutional Committee.
• You must remember the "Highest Level Rule": a study will always be classified according to its most severe stage. If your experiment includes a stage of animal rearing (Level 2) followed by a stage of toxin exposure (Level 5), the entire protocol will be considered Level 5. This understanding is critical when submitting the application for ethical approval, as it determines the level of documentation and monitoring you will be required to perform.
• Another aspect of welfare in Levels 4 and 5 is the existence of a dedicated monitoring and documentation procedure. At these levels, the researcher is required to maintain a daily monitoring log of the animals' health and to report any deviation. The Council for Animal Experimentation emphasizes that a high severity classification is not a "license to cause suffering," but rather the opposite—it is a requirement for increased vigilance and supportive care.
• Finally, at every severity level, and especially at the highest ones, we define Humane Endpoints. These are objective measures (such as a specific weight loss or change in body temperature) at which the experiment will be stopped and the animal will be euthanized to prevent unnecessary suffering, even if the experimental goals have not yet been achieved. Setting these endpoints is the practical expression of the Refinement principle and the ethical regulation of severity levels in the laboratory.`

            audio: "audio7.mp3", 
            text: `Slide 7: Applying Severity Levels 1–3 – From Theory to Practice in the Laboratory.
• Introduction to Practical Classification: Having reviewed the general definitions, this slide is intended to provide you, as researchers, with the practical tools to classify your protocol. The distinction between levels is not merely technical; it is based on understanding the "user experience"—in this case, the animal—and monitoring clinical signs that indicate a deviation from the expected level of comfort. We will begin by examining concrete examples that clarify the boundaries between Levels 1, 2, and 3.
• Severity Level 1: The Research Baseline. Severity Level 1 constitutes the research baseline. The classic example here is the collection of organs or tissues from animals that have not undergone any experimental procedure during their lifetime. Here, your scientific excellence is measured by the choice of the Euthanasia method. Using a humane and approved method, such as controlled CO2 inhalation or decapitation in small animals, ensures that no suffering is caused prior to data collection. At the molecular level, this stage is critical to prevent "background noise" in gene or protein expression caused by pre-mortem stress.
• Severity Level 2: Slight and Temporary Discomfort. Transitioning to Severity Level 2, we deal with experiments that cause, at most, slight and temporary discomfort. A prominent example is the administration of substances by injection through standard routes: SC (subcutaneous), IP (intraperitoneal), IM (intramuscular), or IV (intravenous), as well as oral administration. Please note: these injections are classified as Level 2 only on the condition that the injected substance itself does not cause pain or harmful side effects. More complex injections, such as Intracardiac or Intrathoracic injections, are not included here due to their high potential for pain.
• Behavioral Studies and Physiological Stability: Another aspect of Level 2 involves behavioral experiments that are "clean" of stress. These include place preference tests, curiosity tests, or simple observations. However, you must be aware of the exclusions: tests involving significant stress, such as the Morris Water Maze or "predator-prey" experiments, are excluded from Level 2 due to the psychological and physical stress involved. The goal in Level 2 is to keep the animal in a physiological state as close as possible to its natural resting state.
• Sampling and Marking Procedures: In the field of sampling, Level 2 allows for blood collection from peripheral vessels (such as the tail vein in rodents) without anesthesia, up to the volumes approved in the procedures. Marking actions such as tail tattooing or ear tagging are also included here. Biologically, we assume that the pain of the prick is momentary and does not persistently activate chronic pain pathways or the HPA axis.
• Severity Level 3: Minor Stress or Mild Pain. As we ascend to Severity Level 3, we enter the domain of minor stress or mild pain, but without lasting disturbance to welfare. The guiding rule in Level 3 is the stability of physiological parameters. If the animal shows signs of self-harm, anorexia (lack of appetite), dehydration, or an extreme change in social behavior (isolation or excessive aggression), then the experiment has deviated from the definitions of Level 3. Early identification of these signs is your direct responsibility as laboratory researchers.
• Acute Experiments (Non-recovery Procedures): One of the most important points regarding Level 3 is the handling of acute experiments. The law stipulates that an experiment performed under full anesthesia from which the animal does not recover (Non-recovery procedure) will always be classified as Level 3. This holds true even if you performed a very complex surgery during the anesthesia, such as an organ transplant or brain surgery. The ethical logic is simple: because the animal does not regain consciousness, it does not experience post-operative trauma; therefore, the severity level is "locked" at Level 3.
• Minor Invasive Procedures and Anesthesia: Another example of Level 3 involves minor invasive actions under anesthesia, such as cannulation (insertion of catheters) into blood vessels or body cavities, and performing small biopsies or laparoscopies. At this level, we use anesthesia to mask the pain during the procedure but expect a quick and smooth recovery without the need for complex chronic pain management. Blood collection from the heart or the retro-orbital sinus (behind the eye) is also performed at this level and must be conducted under anesthesia.
• Environmental and Physiological Restrictions: Environmental and physiological restrictions also fall under this classification. Depriving an animal of food or water for periods of up to 12 hours—strictly during the animal's active hours—is considered Level 3. Beyond this time, the metabolism of small rodents may enter energetic distress that would raise the severity level. Similarly, movement restriction for a short time for tests or markings, which does not exceed minimal stress, is classified here.
• Conclusion: To conclude this slide, you must understand that the transition between Levels 2 and 3 is often subtle. As researchers, you must ask yourselves: "Will my animal return to full social and physiological function within minutes, or does it require a recovery period?" Choosing the correct examples in your ethics application not only facilitates the committee's work but ensures that you are aware of every single stage in the life of your model animal.`

            text: `Slide 8: Severity Level 4 – Physiological Disturbance and Active Pain Management.
• We are now moving to Severity Level 4, which is defined by the Ministry of Health as the level encompassing experiments with the potential to cause a moderate level of pain, suffering, or distress. The fundamental difference between this level and the previous ones lies in the concept of continuity: here, we are discussing procedures that may cause a persistent disturbance to the animal's general condition, its welfare, or its normal activity. At this level, the animal does not return to "business as usual" immediately following the procedure; instead, it requires clinical support and close monitoring.
• A central aspect of Level 4 is the regulatory obligation to provide analgesia (pain relief). Unlike Level 5, where analgesics are sometimes withheld for scientific reasons, Level 4 mandates pain management in every case where treatment can provide relief to the animal without compromising the goals of the experiment. It is crucial to understand that the classification to Level 4 stems from the procedure's potential to cause pain, and not from the fact that analgesics were administered. Analgesia is our tool to reduce suffering, but the grade reflects the severity of the procedure itself.
• A classic example of Level 4 is Major Surgeries from which the animal recovers. Unlike the acute experiment in Level 3, here the animal must contend with the post-operative recovery phase. These surgeries include opening body cavities (abdomen, thorax) or the removal of organs. At this level, you must demonstrate to the Ethics Committee that you have a detailed pain management protocol including drugs from different families (such as opioids and NSAIDs) to ensure a humane recovery.
• In the field of oncology, local cancerous tumors are classified as Level 4. The focus is on the word "local"—meaning a tumor that is non-metastatic and does not cause extreme cachexia (extreme weight loss) or broad systemic damage at this stage. However, the very presence of the tumor, the mechanical pressure it exerts, and the inflammatory processes surrounding it require daily monitoring and supportive care as needed.
• This level also addresses significant physiological and environmental restrictions. Prolonged restraint, defined as exceeding 60 minutes, raises the severity level to 4 due to the physiological stress and the increase in corticosterone levels caused to the animal. Similarly, extreme changes in environmental conditions, such as extreme temperatures or chronically disrupted lighting regimes, are considered a significant disturbance to the animal's autonomous welfare.
• The subject of physiological suppression is extensively represented here. The use of radiation, exposure to carcinogens, or toxins that do not cause death but impair organ function, are included in this level. Also, food or water deprivation for a period exceeding 12 hours during active hours is classified here, provided this does not lead to a drastic and critical decrease in weight. The boundary between Level 4 and Level 5 here is subtle and depends on the degree of impairment to the general condition.
• An interesting facet of Level 4 is experiments in which analgesia does not provide relief to the animal, yet the level remains high due to the impact on welfare. An example of this is inducing paralysis. The paralysis itself may not be accompanied by physical pain, but the loss of motor ability, the inability to reach food easily, or to socialize, constitutes significant suffering justifying a Level 4 classification. This is an application of the concept of "Distress" as distinguished from "Pain."
• In immunology experiments, the use of CFA (Complete Freund's Adjuvant) is a prime example of Level 4. This substance causes an acute and prolonged inflammatory response required to create models of autoimmune diseases (such as EAE or arthritis). Due to the local and systemic pain caused by the inflammation, the researcher is obligated to perform rigorous monitoring and provide analgesics that do not interfere with the immune model.
• Psychological and behavioral aspects are also included in this level, such as addiction and withdrawal experiments. Withdrawal symptoms in animals include restlessness, tremors, and autonomous disturbances that constitute moderate to severe stress. Similarly, "predator-prey" experiments that cause intense psychological stress are part of the Level 4 repertoire due to the massive activation of the animal's physiological emergency systems.
• In conclusion, working at Severity Level 4 requires a high level of clinical proficiency. You must maintain a dedicated monitoring and documentation log for the health of the animals, as required by the Council's procedures. As graduate students, you must understand that Level 4 is the level where dialogue with the Attending Veterinarian (AV) becomes most essential—not only to comply with the law, but to ensure that your science is not contaminated by untreated pain that could bias all your physiological results.
• Every experiment at Level 4 or higher obligates the researcher to perform thrice-weekly monitoring of the animals and a minimum of twice-weekly weight checks. For each specific experiment, appropriate twice-weekly monitoring is also conducted, such as in cancer research—measuring tumor size, ulceration, etc.`

            text: `Slide 9: Severity Level 5 – Maximum Severity and Critical Monitoring Protocols.
• We have now reached the apex of the regulatory and ethical pyramid—Severity Level 5. These are experiments with the potential to cause substantial distress, suffering, or pain, as well as experiments that may cause significant and lasting disturbance to the animal's welfare and normal activity. It is important to emphasize that few studies receive this classification, and precisely because of their sensitivity, they are subject to the most special and stringent procedures aimed at ensuring animal welfare under scientific constraints.
• Level 5 includes cases where the procedure itself may be at a lower level (such as Level 4), but there are "severity variables" that escalate it. The most prominent case is a study in which, for justified scientific reasons, analgesics cannot be used. For example, in studies examining the molecular mechanism of pain itself, or when the anesthetic drugs interfere with the biological pathway being studied. In these cases, the Council requires a solid scientific justification as to why the animal's condition cannot be alleviated through pharmacological means, and obligates us to employ every other non-pharmacological supportive measure.
• Another example of a Level 5 classification is research on metastatic cancer. In contrast to local cancer in Level 4, in metastatic cancer, the inability to accurately assess the locations of metastases and the extent of their impact on internal organs raises the risk level and the severity of the classification. Even if analgesics are provided, the uncertainty regarding the general physiological state obliges us to treat the experiment at the highest severity level.
• The field of toxicology (toxicity) is also classified as Level 5 due to its risk potential. It is important to understand that the goal of these experiments is not to cause death, but to determine a safe dosage for human use. However, because there is a probability of an acute systemic reaction or the death of particularly sensitive animals, the classification remains at Level 5 as a regulatory safety factor that ensures close supervision.
• Working at Level 5 imposes a heavy clinical responsibility upon you, the researchers. The central emphasis here is on continuous and rigorous monitoring from the onset of clinical signs. Unlike the lower Levels 1–3, in Levels 4 and 5, it is mandatory to perform a vitality check and physical monitoring of the animal every single day, including weekends and holidays if necessary. The monitoring is not a "quick glance" at the cage, but a structured clinical assessment based on objective parameters.
• Your primary working tool is the Clinical Scoring System. You must check the animal's vitality daily: Is it active? Is it building a nest? Is its fur ruffled (Piloerection)? Is there a change in posture (Hunched posture)? Each of these parameters receives a score, and when the cumulative score reaches a certain threshold, the veterinarian and the committee mandate the immediate termination of the experiment.
• Alongside vitality indicators, weight checks are the most reliable measure of the general condition. Weight loss is often the first sign of distress or illness in rodents. In Level 4 and Level 5 experiments, we expect frequent weight monitoring. A decrease of 10% or 15% of body weight (depending on the approved protocol) usually constitutes a "Humane Endpoint" necessitating euthanasia, to prevent the animal from reaching irreversible stages of suffering.
• Remember that in Levels 4 and 5, your professional judgment is critical. You must maintain a dedicated monitoring and documentation log for each and every animal. The Council for Animal Experimentation emphasizes that documentation at this level is not mere bureaucracy—it is the scientific tool that ensures the data you collect is not biased as a result of extreme stress, and it is the moral tool that ensures you are meeting your commitment to Refinement.
• In conclusion, as graduate students performing research at Level 4 and Level 5, you must be present in the field. Your daily contact with the animals in the laboratory is what will allow you to identify the smallest nuance in behavior that could indicate distress. The combination of your noble scientific goal and rigorous, uncompromising monitoring is what defines you as ethical and professional researchers at the forefront of science.`

    let currentIdx = parseInt(localStorage.getItem('savedSlideIndex')) || 0;
    const audio = document.getElementById('audio-player');
    const image = document.getElementById('slide-image');
    const nextBtn = document.getElementById('next-btn');
    const transcriptText = document.getElementById('transcript-text');

    function loadSlide(idx) {
        if (!slides[idx]) return;
        const slide = slides[idx];
        image.src = slide.img;
        audio.src = slide.audio;
        transcriptText.innerText = slide.text;
        transcriptText.style.top = "0px";
        nextBtn.style.display = 'none'; 
        localStorage.setItem('savedSlideIndex', idx);
    }

    audio.ontimeupdate = () => {
        const delaySeconds = 7; 
        
        if (audio.duration && audio.currentTime > delaySeconds) {
            const adjustedCurrentTime = audio.currentTime - delaySeconds;
            const adjustedDuration = audio.duration - delaySeconds;
            
            const progress = adjustedCurrentTime / adjustedDuration;
            const textHeight = transcriptText.scrollHeight;
            const containerHeight = 130; 
            
            if (textHeight > containerHeight) {
                const scrollDistance = (textHeight - containerHeight) * progress;
                transcriptText.style.top = `-${scrollDistance}px`;
            }
        } else {
            transcriptText.style.top = "0px";
        }
    };

    audio.onended = () => {
        if (currentIdx < slides.length - 1) {
            nextBtn.style.display = 'block';
        }
    };

    function nextSlide() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            loadSlide(currentIdx);
            audio.play();
        }
    }

    function prevSlide() {
        if (currentIdx > 0) {
            currentIdx--;
            loadSlide(currentIdx);
            audio.play();
        }
    }

    window.onload = () => loadSlide(currentIdx);
</script>
